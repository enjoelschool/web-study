<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グループ化の練習</title>
</head>
<body>
    <!-- 情報をグループ化 -->
    <!-- 
    div => 意味を持たない汎用ブロック
    section => セクションをグルーピング
    header => セクションのヘッダー
    footer => セクションのフッター
    main => 文書のメインコンテンツ領域
    article => 記事コンテンツ要素
    aside => 余談要素
    nav => ナビゲーション要素
    -->
    <header>
        <h1>グループ化の練習</h1>
        <nav>
            <ul>
                <li><a href="#">エンジニアへの道</a></li>
                <li><a href="#">プログラミング入門</a></li>
                <li><a href="#">ニュース</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <article>
        <!-- 独立して記事として成り立つ部分 -->
        <h2>グループ化を学ぶのにおすすめのサイト10選</h2>
        <p>グループ化を学べるサイトを10個紹介します。</p>
        </article>

        <section>
            <!-- リンク集のためそれだけでは記事として成り立たない -->
            <h2>関連記事</h2>
            <ul>
                <li><a href="#">関連記事1</a></li>
                <li><a href="#">関連記事2</a></li>
                <li><a href="#">関連記事3</a></li>
            </ul>
        </section>
    </main>

    <aside>
        <!-- メインコンテンツではない付則情報(メインとは関連性が低い) -->
        <h2>広告</h2>
        <p>全ショップ対象エントリーでポイント5倍!</p>
    </aside>
    
    <footer>
    <p><small>&copy; 2026 enjoel.</small></p>
    </footer>
</body>
</html>
