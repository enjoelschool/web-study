<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <title>はじめてのHTML</title>
        <style>
            h1 {
                color: red;
            }
        </style>
    </head>

    <body>
        <!-- 
        VSCodeでEmmetを使った入力
        Emmet(エメット)の参考サイト
        https://blog.proglus.jp/4428/

        ! + tab -> HTMLの雛形を生成
        p + tab -> pタグを生成
        ctrl + / -> コメントタグを生成
        ol>li*3 -> olタグと3つのliタグができる
         -->

        <!-- 見出し -->
        <h1>はじめての見出し</h1>
        <!-- 段落 -->
        <p>はじめての段落</p>
        <!-- 区切り線 -->
        <hr>
        <!-- 改行 -->
        <p>
            国会議事堂の住所<br>
            100-0014<br>
            東京都<br>
            千代田区<br>
            永田町1−7−1<br>
        </p>
        <!-- 順序なしリスト -->
        <ul>
            <li>りんご</li>
            <li>みかん</li>
            <li>ぶどう</li>
        </ul>
        
    </body>
</html>
