<!DOCTYPE html>

    <head>

                color: red;
            }

    <body>

        -->

        <p>はじめての段落</p>
        <hr>
        <p>
            国会議事堂の住所<br>
            100-0014<br>
            東京都<br>
            千代田区<br>
            永田町1−7−1<br>
        </p>
    </body>
